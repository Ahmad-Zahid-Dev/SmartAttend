<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | Student Registration Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="portal-theme registration-page">
    <div class="portal-blob blob-1"></div>
    <div class="portal-blob blob-2"></div>
    <div class="portal-blob blob-3"></div>
    
    <div class="registration-wrapper">
        <div class="registration-container">
            <div class="back-nav">
                <a href="javascript:void(0)" onclick="goBackPreviousScreen()" class="btn btn-outline" style="border-radius: 50px; padding: 0.5rem 1.5rem; text-transform: none;">
                    <i class="fas fa-chevron-left"></i> <span>Back to Previous Screen</span>
                </a>
            </div>

            <div class="card glass-card register-card">
                <div class="card-corners">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                </div>
                <div class="header-section" style="text-align: center; margin-bottom: 1.5rem;">
                    <div class="brand-container" style="justify-content: center; margin-bottom: 1rem;">
                        <i class="fas fa-id-card brand-icon" style="color: var(--primary);"></i>
                        <span id="page-title" style="font-size: 1.5rem; font-weight: 800; color: #1e293b; letter-spacing: 1px;">Student Registration Form</span>
                    </div>
                </div>

                <!-- Student Registration Form -->
                <form id="regForm" oninput="validateForm()">
                    <div class="grid-2">
                        <div class="input-group">
                            <label><i class="fas fa-hashtag"></i> Enrollment ID <span style="color:var(--text-muted);font-weight:400;font-size:0.72rem;">(10 digits)</span></label>
                            <input type="text"
                                   id="enrollment_no"
                                   name="enrollment_no"
                                   placeholder="e.g. 2300123456"
                                   inputmode="numeric"
                                   maxlength="10"
                                   minlength="10"
                                   pattern="[0-9]{10}"
                                   title="Enrollment ID must be exactly 10 digits"
                                   required
                                   oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                                   onchange="liveValidate(this,'[0-9]{10}','Exactly 10 digits required')"
                                   onkeyup="liveValidate(this,'[0-9]{10}','Exactly 10 digits required')">
                            <span id="err-enrollment" class="field-hint"></span>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-user-tag"></i> Student Name</label>
                            <input type="text" id="full_name" name="full_name" placeholder="Assigned full name" required>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="input-group">
                            <label><i class="fas fa-phone-alt"></i> Student Contact No. <span style="color:var(--text-muted);font-weight:400;font-size:0.72rem;">(+91 10 digits)</span></label>
                            <!-- Phone is stored with +91 prefix; user types 10-digit mobile number -->
                            <div style="display:flex;gap:6px;align-items:center;">
                                <span style="padding:0.6rem 0.8rem;background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.2);border-radius:10px;font-weight:700;font-size:0.85rem;color:var(--primary);white-space:nowrap;">+91</span>
                                <input type="tel"
                                       id="phone"
                                       name="phone"
                                       placeholder="9876543210"
                                       inputmode="numeric"
                                       maxlength="10"
                                       minlength="10"
                                       pattern="[6-9][0-9]{9}"
                                       title="Enter 10-digit Indian mobile number starting with 6, 7, 8, or 9"
                                       required
                                       style="flex:1;"
                                       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                                       onchange="liveValidate(this,'[6-9][0-9]{9}','Must be a valid 10-digit Indian mobile number (starts with 6/7/8/9)')"
                                       onkeyup="liveValidate(this,'[6-9][0-9]{9}','Must be a valid 10-digit Indian mobile number (starts with 6/7/8/9)')">
                            </div>
                            <span id="err-phone" class="field-hint"></span>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-at"></i> Student Email Id <span style="color:var(--text-muted);font-weight:400;font-size:0.72rem;">(@gmail.com only)</span></label>
                            <input type="email"
                                   id="email"
                                   name="email"
                                   placeholder="yourname@gmail.com"
                                   pattern="[a-zA-Z0-9._%+\-]+@gmail\.com"
                                   title="Only Gmail addresses are accepted (e.g. name@gmail.com)"
                                   required
                                   onchange="liveValidate(this,'[a-zA-Z0-9._%+\\-]+@gmail\\.com','Only @gmail.com addresses are accepted')"
                                   onkeyup="liveValidate(this,'[a-zA-Z0-9._%+\\-]+@gmail\\.com','Only @gmail.com addresses are accepted')">
                            <span id="err-email" class="field-hint"></span>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="input-group">
                            <label><i class="fas fa-birthday-cake"></i> DOB</label>
                            <input type="date" id="dob" name="dob" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-layer-group"></i> Select Course</label>
                            <select id="class_id" name="class_id" required>
                                <option value="" disabled selected>Student Course</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-map-marker-alt"></i> Home Address</label>
                        <textarea id="address" name="address" rows="2" placeholder="Enter residential address" style="resize: none;" required></textarea>
                    </div>

                    <div class="grid-2">
                        <div class="input-group">
                            <label><i class="fas fa-user-shield"></i> Student Username</label>
                            <input type="text" id="username" name="username" placeholder="Portal identity" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fas fa-lock"></i> Student Password</label>
                            <div class="password-wrap">
                                <input type="password" id="password" name="password" placeholder="Secure passcode" required>
                                <button type="button" class="password-toggle" onclick="toggleStudentPassword()" aria-label="Toggle password visibility">
                                    <i class="fas fa-eye" id="student-pass-icon"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="captureBtn" class="btn btn-primary btn-capture w-full mt-2" style="width: 100%; justify-content: center; height: 50px;">
                        <i class="fas fa-camera"></i> Start Face Capture
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="camera-modal">
        <div class="camera-box card glass-card" style="max-width: 600px; border-color: var(--primary);">
            <div class="card-corners">
                <div class="corner tl"></div>
                <div class="corner tr"></div>
                <div class="corner bl"></div>
                <div class="corner br"></div>
            </div>
            <div class="header-section" style="margin-bottom: 1.5rem; text-align: center;">
                <h3 style="color: var(--primary); justify-content: center; margin-bottom: 0.5rem;"><i class="fas fa-camera"></i> Face Capture</h3>
                <p id="capture-status-msg" style="color: var(--text-muted); font-size: 0.85rem;">Look straight into the camera</p>
            </div>
            
            <div class="scanner-container" style="background: #000; border-radius: 16px; margin-bottom: 1.5rem; position: relative; min-height: 300px; overflow: hidden;">
                <img id="reg-feed" src="" class="no-crop" style="width: 100%; height: 100%; display: block;" onerror="handleCameraError()">
                <div class="scanning-line"></div>
                <div id="feed-loading" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;color:#60a5fa;font-size:0.85rem;flex-direction:column;gap:10px;">
                    <i class="fas fa-circle-notch fa-spin" style="font-size:2rem;"></i>
                    <span>Starting camera...</span>
                </div>
                <div id="camera-error-ui" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);flex-direction:column;align-items:center;justify-content:center;color:#ef4444;text-align:center;padding:20px;">
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:10px;"></i>
                    <p style="margin-bottom:15px;">Camera Feed Unavailable</p>
                    <button onclick="retryCamera()" class="btn btn-primary" style="background:#dc2626;border:none;">Fix & Retry</button>
                </div>
            </div>

            <div class="progress-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: 800; font-size: 0.7rem; letter-spacing: 1px;">
                    <span id="pb-text" style="color: var(--primary);">CAPTURING... 0%</span>
                    <span id="pb-count" style="color: var(--text-muted);">0 / 100 frames</span>
                </div>
                <div style="height: 8px; background: rgba(37,99,235,0.1); border-radius: 10px; overflow: hidden; border: 1px solid rgba(37,99,235,0.2);">
                    <div id="pb-fill" style="height: 100%; background: linear-gradient(90deg, #06b6d4, #2563eb); width: 0%; transition: width 0.3s ease; box-shadow: 0 0 10px rgba(37,99,235,0.5);"></div>
                </div>
            </div>
            
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem; text-align:center;">
                <i class="fas fa-info-circle"></i> Keep your face centered and well-lit. Do not move rapidly.
            </p>
        </div>
    </div>

    <style>
        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            background: rgba(15, 23, 42, 0.05);
            padding: 5px;
            border-radius: 14px;
        }

        .role-btn {
            border: none;
            background: transparent;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .role-btn:hover { color: var(--primary); }
        .role-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .multi-select-container {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        .subject-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #fff;
            border-radius: 8px;
            font-size: 0.8rem;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .subject-item:hover { background: var(--primary-light); border-color: rgba(37,99,235,0.1); }
        .subject-item input { width: 14px; height: 14px; cursor: pointer; }

        /* Field validation hint text */
        .field-hint {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 4px;
            min-height: 16px;
            transition: color 0.2s;
        }

        /* Keep capture panel centered below the registration form */
        .camera-modal {
            display: none;
            width: 100%;
            margin-top: 2rem;
            padding: 0 0.75rem;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
        }

        .camera-modal .camera-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            width: 100%;
            padding-right: 42px;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 0;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
        }

        @media (max-width: 768px) {
            .register-card {
                padding: 2rem 1.5rem !important;
            }
            .registration-wrapper {
                padding: 1rem;
            }
            .grid-2 {
                gap: 0;
            }
            .camera-modal {
                padding: 0;
            }
        }
    </style>

    <script>
        let captureRuntimeConfig = { camera_mode: 'server' };
        let browserCaptureVideo = null;
        let browserCaptureStream = null;
        let browserCaptureInterval = null;

        // Initialization
        window.addEventListener('load', async () => {
            try {
                const cfgRes = await fetch('/api/runtime_config');
                if (cfgRes.ok) {
                    captureRuntimeConfig = await cfgRes.json();
                }
            } catch (e) {}

            await loadMetadata();
            
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
        });

        async function loadMetadata() {
            try {
                // Load Classes for Students
                const cRes = await fetch('/api/classes');
                const classes = await cRes.json();
                const studentSelect = document.getElementById('class_id');
                
                const options = classes.map(c => `<option value="${c.id}">${c.ClassName}</option>`).join('');
                studentSelect.innerHTML = '<option value="" disabled selected>Student Course</option>' + options;
            } catch(e) {
                console.error("Metadata load failed", e);
            }
        }

        // Live field validator: shows green tick / red message under fields
        function liveValidate(input, pattern, errorMsg) {
            const regex = new RegExp('^' + pattern + '$');
            const hintId = 'err-' + input.id;
            const hint = document.getElementById(hintId);
            if (regex.test(input.value)) {
                input.style.borderColor = '#10b981';  // green
                if (hint) { hint.textContent = '✔ Looks good'; hint.style.color = '#10b981'; }
                input.setCustomValidity('');
            } else if (input.value.length > 0) {
                input.style.borderColor = '#ef4444';  // red
                if (hint) { hint.textContent = '✗ ' + errorMsg; hint.style.color = '#ef4444'; }
                input.setCustomValidity(errorMsg);
            } else {
                input.style.borderColor = '';
                if (hint) hint.textContent = '';
                input.setCustomValidity('');
            }
            validateForm();
        }

        function validateForm() {
            const form = document.getElementById('regForm');
            const btn = document.getElementById('captureBtn');
            btn.classList.toggle('active', form.checkValidity());
        }

        function toggleStudentPassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('student-pass-icon');
            if (!passInput || !icon) return;

            const isHidden = passInput.type === 'password';
            passInput.type = isHidden ? 'text' : 'password';
            icon.classList.toggle('fa-eye', !isHidden);
            icon.classList.toggle('fa-eye-slash', isHidden);
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();

            // Final validation guard before submit
            const enrollment = document.getElementById('enrollment_no').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;

            if (!/^[0-9]{10}$/.test(enrollment)) {
                showToast('⚠ Enrollment ID must be exactly 10 digits.');
                return;
            }
            if (!/^[6-9][0-9]{9}$/.test(phone)) {
                showToast('⚠ Enter a valid 10-digit Indian mobile number.');
                return;
            }
            if (!/^[a-zA-Z0-9._%+\-]+@gmail\.com$/.test(email)) {
                showToast('⚠ Only @gmail.com email addresses are accepted.');
                return;
            }

            const btn = document.getElementById('captureBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Registering...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            // Attach the +91 prefix before sending to backend
            data.phone = '+91' + data.phone;

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.success) {
                    // Short delay so browser is ready before opening modal
                    setTimeout(() => startCapture(result.id, data.class_id, data.enrollment_no), 200);
                } else {
                    showToast(result.message || 'Registration failed. Check all fields.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-camera"></i> Start Face Capture';
                }
            } catch (err) {
                console.error(err);
                showToast('Connection error. Is the server running?');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-camera"></i> Start Face Capture';
            }
        };

        let currentCaptureParams = null;

        function ensureBrowserCaptureVideo() {
            if (browserCaptureVideo) return browserCaptureVideo;
            const scanner = document.querySelector('#cameraModal .scanner-container');
            if (!scanner) return null;

            const video = document.createElement('video');
            video.id = 'reg-browser-feed';
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.display = 'none';
            video.style.objectFit = 'cover';

            scanner.appendChild(video);
            browserCaptureVideo = video;
            return browserCaptureVideo;
        }

        async function startBrowserCaptureFlow(sid, cid, eno) {
            const loading = document.getElementById('feed-loading');
            const statusMsg = document.getElementById('capture-status-msg');
            const imgFeed = document.getElementById('reg-feed');
            const video = ensureBrowserCaptureVideo();

            if (!video || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showToast('Browser camera not supported on this device.');
                return;
            }

            try {
                browserCaptureStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: false
                });
            } catch (e) {
                showToast('Camera permission denied. Please allow camera access.');
                return;
            }

            video.srcObject = browserCaptureStream;
            video.style.display = 'block';
            if (imgFeed) {
                imgFeed.src = '';
                imgFeed.style.display = 'none';
            }
            if (loading) {
                loading.style.opacity = '0';
                setTimeout(() => { loading.style.display = 'none'; }, 300);
            }
            if (statusMsg) statusMsg.innerText = 'Capturing from your browser camera...';

            if (browserCaptureInterval) clearInterval(browserCaptureInterval);
            browserCaptureInterval = setInterval(async () => {
                if (!browserCaptureVideo || browserCaptureVideo.readyState < 2) return;

                const canvas = document.createElement('canvas');
                canvas.width = browserCaptureVideo.videoWidth || 640;
                canvas.height = browserCaptureVideo.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(browserCaptureVideo, 0, 0, canvas.width, canvas.height);

                try {
                    const res = await fetch('/api/capture_frame', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image: canvas.toDataURL('image/jpeg', 0.75),
                            student_id: sid,
                            class_id: cid,
                            enrollment_no: eno
                        })
                    });
                    const status = await res.json();
                    if (!res.ok || !status.success) return;

                    const total = 100;
                    const count = status.count || 0;
                    const progress = Math.min(100, status.progress || Math.round((count / total) * 100));

                    document.getElementById('pb-fill').style.width = progress + '%';
                    document.getElementById('pb-text').innerText = `CAPTURING... ${Math.round(progress)}%`;
                    document.getElementById('pb-count').innerText = `${count} / ${total} frames`;

                    if (count > 0 && count < 30) statusMsg.innerText = 'Good! Keep your face still...';
                    else if (count >= 30 && count < 70) statusMsg.innerText = 'Syncing biometrics... Hold steady.';
                    else if (count >= 70) statusMsg.innerText = 'Optimizing identity profile...';

                    if (status.done || progress >= 100) {
                        clearInterval(browserCaptureInterval);
                        browserCaptureInterval = null;
                        document.getElementById('pb-text').innerText = 'COMPLETE ✓';
                        statusMsg.innerText = 'Face captured successfully!';
                        setTimeout(() => {
                            showToast('✅ Student registered & face captured!');
                            setTimeout(() => window.location.href = '/app?view=manage-students', 2000);
                        }, 800);
                    }
                } catch (e) {
                    console.error(e);
                }
            }, 450);
        }

        function startCapture(sid, cid, eno) {
            currentCaptureParams = { sid, cid, eno };
            const modal = document.getElementById('cameraModal');
            modal.style.display = 'flex';
            
            document.getElementById('camera-error-ui').style.display = 'none';
            document.getElementById('feed-loading').style.display = 'flex';
            document.getElementById('feed-loading').style.opacity = '1';

            const feed = document.getElementById('reg-feed');
            const loading = document.getElementById('feed-loading');
            const statusMsg = document.getElementById('capture-status-msg');

            if (captureRuntimeConfig.camera_mode === 'browser') {
                startBrowserCaptureFlow(sid, cid, eno);
                return;
            }

            const feedUrl = `/video_feed?action=capture&student_id=${sid}&class_id=${cid}&enrollment_no=${eno}&t=${Date.now()}`;
            feed.src = feedUrl;

            feed.onload = () => {
                if (loading) loading.style.opacity = '0';
                setTimeout(() => { if (loading) loading.style.display = 'none'; }, 500);
            };

            startPolling();
        }

        async function retryCamera() {
            if (captureRuntimeConfig.camera_mode === 'browser') {
                if (currentCaptureParams) {
                    startCapture(currentCaptureParams.sid, currentCaptureParams.cid, currentCaptureParams.eno);
                }
                return;
            }

            try {
                await fetch('/api/camera_reboot', { method: 'POST' });
                if (currentCaptureParams) {
                    startCapture(currentCaptureParams.sid, currentCaptureParams.cid, currentCaptureParams.eno);
                }
            } catch (err) {
                showToast("Reboot failed.");
            }
        }

        function handleCameraError() {
            document.getElementById('camera-error-ui').style.display = 'flex';
            document.getElementById('feed-loading').style.display = 'none';
        }

        let pollInterval = null;
        function startPolling() {
            if (captureRuntimeConfig.camera_mode === 'browser') {
                return;
            }

            if (pollInterval) clearInterval(pollInterval);
            const statusMsg = document.getElementById('capture-status-msg');
            let pollErrors = 0;
            
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/capture_status');
                    const status = await res.json();
                    pollErrors = 0;

                    const total = 100;
                    const count = status.count || 0;
                    const progress = Math.min(100, (count / total) * 100);

                    document.getElementById('pb-fill').style.width = progress + '%';
                    document.getElementById('pb-text').innerText = `CAPTURING... ${Math.round(progress)}%`;
                    document.getElementById('pb-count').innerText = `${count} / ${total} frames`;

                    if (count > 0 && count < 30) statusMsg.innerText = 'Good! Keep your face still...';
                    else if (count >= 30 && count < 70) statusMsg.innerText = 'Syncing biometrics... Hold steady.';
                    else if (count >= 70) statusMsg.innerText = 'Optimizing identity profile...';

                    if (progress >= 100) {
                        clearInterval(pollInterval);
                        document.getElementById('pb-text').innerText = 'COMPLETE ✓';
                        statusMsg.innerText = 'Face captured successfully!';
                        setTimeout(() => {
                            showToast('✅ Student registered & face captured!');
                            setTimeout(() => window.location.href = '/app?view=manage-students', 2000);
                        }, 800);
                    }
                } catch (err) {
                    pollErrors++;
                    if (pollErrors > 15) {
                        clearInterval(pollInterval);
                        showToast('Lost connection to server.');
                    }
                }
            }, 400);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.transform = 'translateY(0)';
            setTimeout(() => { toast.style.transform = 'translateY(200%)'; }, 4000);
        }

        function goBackPreviousScreen() {
            // Use browser history when available; otherwise fallback to app home.
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.href = '/app';
        }

    </script>

    <!-- Notification Engine -->
    <div id="toast" style="position: fixed; bottom: 2rem; right: 2rem; background: #1e293b; color: #fff; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; transform: translateY(200%); transition: 0.3s; z-index: 9999; box-shadow: var(--shadow-lg);"></div>

</body>
